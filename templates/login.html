{% extends "base.html" %}
{% block title %}Log In — ToolKit Pro{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-4 pt-16 pb-16">
    <h1 class="text-2xl font-bold text-gray-900 text-center mb-8">Log In</h1>
    <form method="POST" class="bg-white rounded-2xl border border-gray-200 p-8 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" placeholder="you@email.com">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" placeholder="••••••••">
        </div>
        <button type="submit" class="w-full bg-brand-600 text-white py-3 rounded-xl font-semibold hover:bg-brand-700 transition">Log In</button>
        <p class="text-center text-sm text-gray-500">
            No account? <a href="/auth/signup" class="text-brand-600 font-medium">Sign up</a>
        </p>
    </form>
</section>
{% endblock %}
