{% extends "base.html" %}
{% block title %}QR Code Generator — ToolKit Pro{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-4 pt-8 pb-16">
    <a href="/dashboard" class="text-sm text-brand-600 hover:underline mb-4 inline-block">← Back to Dashboard</a>
    <h1 class="text-2xl font-bold text-gray-900 mb-2 dark:text-white">QR Code Generator</h1>
    <p class="text-gray-500 mb-8 dark:text-slate-400">Generate QR codes from URLs, text, or any data. Instant download.</p>

    <div class="bg-white rounded-2xl border border-gray-200 p-8 dark:bg-slate-800 dark:border-slate-700">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1 dark:text-slate-300">Text or URL</label>
            <input type="text" id="qrText" placeholder="https://example.com or any text" maxlength="2048"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 outline-none dark:bg-slate-700 dark:border-slate-600 dark:text-white">
        </div>
        <button id="generateBtn" class="w-full bg-brand-600 text-white py-3 rounded-xl font-semibold hover:bg-brand-700 transition">
            Generate QR Code
        </button>
        <div id="result" class="hidden mt-6 text-center">
            <img id="qrImage" class="mx-auto border rounded-lg max-w-xs" alt="QR Code">
            <a id="downloadLink" href="#" download="qrcode.png" class="inline-block mt-3 text-brand-600 font-medium text-sm">Download PNG</a>
        </div>
        <div id="error" class="hidden mt-4 p-4 bg-red-50 rounded-xl text-sm text-red-700 dark:bg-red-900 dark:text-red-200"></div>
        <div id="limitWarning" class="hidden mt-4 p-4 bg-orange-50 rounded-xl text-sm dark:bg-orange-900 dark:text-orange-200"></div>
    </div>
</section>

<script>
document.getElementById('generateBtn').addEventListener('click', async () => {
    const text = document.getElementById('qrText').value.trim();
    if (!text) return;
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = 'Generating...';
    document.getElementById('result').classList.add('hidden');
    document.getElementById('error').classList.add('hidden');
    document.getElementById('limitWarning').classList.add('hidden');

    const formData = new FormData();
    formData.append('text', text);
    formData.append('_csrf_token', document.querySelector('meta[name="csrf-token"]').content);

    try {
        const res = await fetch('/tools/api/qr-code', { method: 'POST', body: formData });
        if (res.status === 429 && res.headers.get('content-type')?.includes('json')) {
            const data = await res.json();
            if (data.error === 'daily_limit') {
                document.getElementById('limitWarning').innerHTML = `⚠️ ${data.message}`;
                document.getElementById('limitWarning').classList.remove('hidden');
                btn.textContent = 'Limit Reached';
                return;
            }
        }
        if (!res.ok) { const data = await res.json(); throw new Error(data.error || data.message); }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        document.getElementById('qrImage').src = url;
        document.getElementById('downloadLink').href = url;
        document.getElementById('result').classList.remove('hidden');
        btn.textContent = 'Generate Another';
    } catch (e) {
        document.getElementById('error').textContent = e.message || 'Something went wrong.';
        document.getElementById('error').classList.remove('hidden');
        btn.textContent = 'Generate QR Code';
    }
    btn.disabled = false;
});
</script>
{% endblock %}
