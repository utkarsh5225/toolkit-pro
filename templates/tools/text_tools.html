{% extends "base.html" %}
{% block title %}Text Tools — ToolKit Pro{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-4 pt-8 pb-16">
    <a href="/dashboard" class="text-sm text-brand-600 hover:underline mb-4 inline-block">← Back to Dashboard</a>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Text Tools</h1>
    <p class="text-gray-500 mb-8">Word counter, character counter, and case converter. Paste your text below.</p>

    <div class="bg-white rounded-2xl border border-gray-200 p-8">
        <textarea id="textInput" rows="8" placeholder="Paste or type your text here..." 
            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-500 outline-none resize-y text-sm"></textarea>
        
        <!-- Stats -->
        <div id="stats" class="grid grid-cols-4 gap-3 mt-4">
            <div class="bg-gray-50 rounded-lg p-3 text-center">
                <div class="text-2xl font-bold text-brand-600" id="wordCount">0</div>
                <div class="text-xs text-gray-500">Words</div>
            </div>
            <div class="bg-gray-50 rounded-lg p-3 text-center">
                <div class="text-2xl font-bold text-gray-700" id="charCount">0</div>
                <div class="text-xs text-gray-500">Characters</div>
            </div>
            <div class="bg-gray-50 rounded-lg p-3 text-center">
                <div class="text-2xl font-bold text-gray-700" id="charNoSpace">0</div>
                <div class="text-xs text-gray-500">No Spaces</div>
            </div>
            <div class="bg-gray-50 rounded-lg p-3 text-center">
                <div class="text-2xl font-bold text-gray-700" id="lineCount">0</div>
                <div class="text-xs text-gray-500">Lines</div>
            </div>
        </div>

        <!-- Case Converter -->
        <div class="mt-6 flex flex-wrap gap-2">
            <button onclick="convertCase('upper')" class="px-4 py-2 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg transition">UPPER CASE</button>
            <button onclick="convertCase('lower')" class="px-4 py-2 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg transition">lower case</button>
            <button onclick="convertCase('title')" class="px-4 py-2 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg transition">Title Case</button>
            <button onclick="convertCase('sentence')" class="px-4 py-2 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg transition">Sentence case</button>
            <button onclick="copyText()" class="px-4 py-2 text-sm bg-brand-100 text-brand-700 hover:bg-brand-200 rounded-lg transition ml-auto">📋 Copy</button>
        </div>
    </div>
</section>

<script>
const textInput = document.getElementById('textInput');

textInput.addEventListener('input', updateStats);

function updateStats() {
    const text = textInput.value;
    document.getElementById('wordCount').textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
    document.getElementById('charCount').textContent = text.length;
    document.getElementById('charNoSpace').textContent = text.replace(/\s/g, '').length;
    document.getElementById('lineCount').textContent = text ? text.split('\n').length : 0;
}

function convertCase(type) {
    const text = textInput.value;
    if (!text.trim()) return;
    
    if (type === 'upper') textInput.value = text.toUpperCase();
    else if (type === 'lower') textInput.value = text.toLowerCase();
    else if (type === 'title') textInput.value = text.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
    else if (type === 'sentence') textInput.value = text.replace(/(^\s*\w|[.!?]\s+\w)/g, c => c.toUpperCase());
    
    updateStats();
}

function copyText() {
    navigator.clipboard.writeText(textInput.value).then(() => {
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
    });
}
</script>
{% endblock %}
