{% extends "base.html" %}
{% block title %}Compress PDF — ToolKit Pro{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-4 pt-8 pb-16">
    <a href="/dashboard" class="text-sm text-brand-600 hover:underline mb-4 inline-block">← Back to Dashboard</a>
    <h1 class="text-2xl font-bold text-gray-900 mb-2 dark:text-white">Compress PDF</h1>
    <p class="text-gray-500 mb-8 dark:text-slate-400">Reduce PDF file size. Files processed in-memory — never stored.</p>

    <div class="bg-white rounded-2xl border border-gray-200 p-8 dark:bg-slate-800 dark:border-slate-700">
        <!-- Upload -->
        <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center hover:border-brand-400 transition cursor-pointer dark:border-slate-600">
            <div class="text-4xl mb-3">📄</div>
            <p class="text-gray-600 font-medium dark:text-slate-300">Drop your PDF here or click to browse</p>
            <p class="text-sm text-gray-400 mt-1 dark:text-slate-500">Max 50MB</p>
            <input type="file" id="fileInput" accept=".pdf" class="hidden">
        </div>
        <div id="fileInfo" class="hidden mt-4 p-3 bg-gray-50 rounded-lg text-sm text-gray-700 dark:bg-slate-700 dark:text-slate-300"></div>

        <!-- Compression Level -->
        <div id="levelSelect" class="hidden mt-4">
            <label class="block text-sm font-medium text-gray-700 mb-2 dark:text-slate-300">Compression Level</label>
            <div class="grid grid-cols-3 gap-3">
                <label class="relative cursor-pointer">
                    <input type="radio" name="level" value="low" class="peer sr-only">
                    <div class="border-2 border-gray-200 rounded-xl p-3 text-center peer-checked:border-brand-500 peer-checked:bg-brand-50 dark:border-slate-600 dark:peer-checked:bg-brand-900/30 transition">
                        <div class="font-semibold text-gray-900 text-sm dark:text-white">Low</div>
                        <div class="text-xs text-gray-400 mt-1 dark:text-slate-500">Lossless</div>
                        <div class="text-xs text-gray-500 mt-0.5 dark:text-slate-400">~10-20% smaller</div>
                    </div>
                </label>
                <label class="relative cursor-pointer">
                    <input type="radio" name="level" value="medium" checked class="peer sr-only">
                    <div class="border-2 border-brand-500 bg-brand-50 rounded-xl p-3 text-center peer-checked:border-brand-500 peer-checked:bg-brand-50 dark:peer-checked:bg-brand-900/30 transition">
                        <div class="font-semibold text-gray-900 text-sm dark:text-white">Medium</div>
                        <div class="text-xs text-gray-400 mt-1 dark:text-slate-500">Recommended</div>
                        <div class="text-xs text-gray-500 mt-0.5 dark:text-slate-400">~30-50% smaller</div>
                    </div>
                </label>
                <label class="relative cursor-pointer">
                    <input type="radio" name="level" value="high" class="peer sr-only">
                    <div class="border-2 border-gray-200 rounded-xl p-3 text-center peer-checked:border-brand-500 peer-checked:bg-brand-50 dark:border-slate-600 dark:peer-checked:bg-brand-900/30 transition">
                        <div class="font-semibold text-gray-900 text-sm dark:text-white">Maximum</div>
                        <div class="text-xs text-gray-400 mt-1 dark:text-slate-500">Lossy</div>
                        <div class="text-xs text-gray-500 mt-0.5 dark:text-slate-400">~50-80% smaller</div>
                    </div>
                </label>
            </div>
        </div>

        <button id="processBtn" class="hidden w-full mt-4 bg-brand-600 text-white py-3 rounded-xl font-semibold hover:bg-brand-700 transition disabled:opacity-50" disabled>
            Compress PDF
        </button>
        <div id="result" class="hidden mt-4 p-4 bg-green-50 rounded-xl text-sm dark:bg-green-900 dark:text-green-200"></div>
        <div id="error" class="hidden mt-4 p-4 bg-red-50 rounded-xl text-sm text-red-700 dark:bg-red-900 dark:text-red-200"></div>
        <div id="limitWarning" class="hidden mt-4 p-4 bg-orange-50 rounded-xl text-sm dark:bg-orange-900 dark:text-orange-200"></div>
    </div>
</section>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const levelSelect = document.getElementById('levelSelect');
const processBtn = document.getElementById('processBtn');
const result = document.getElementById('result');
const error = document.getElementById('error');
const limitWarning = document.getElementById('limitWarning');
let selectedFile = null;

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-brand-400', 'bg-brand-50'); });
dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('border-brand-400', 'bg-brand-50'); });
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('border-brand-400', 'bg-brand-50');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

function handleFile(file) {
    if (file.type !== 'application/pdf') { showError('Please upload a PDF file.'); return; }
    if (file.size > 50 * 1024 * 1024) { showError('File too large. Max 50MB.'); return; }
    selectedFile = file;
    fileInfo.innerHTML = `📄 <strong>${file.name}</strong> <span class="text-gray-400">(${(file.size / 1024).toFixed(0)} KB)</span>`;
    fileInfo.classList.remove('hidden');
    levelSelect.classList.remove('hidden');
    processBtn.classList.remove('hidden');
    processBtn.disabled = false;
    processBtn.textContent = 'Compress PDF';
    result.classList.add('hidden');
    error.classList.add('hidden');
    limitWarning.classList.add('hidden');
}

processBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    processBtn.disabled = true;
    processBtn.textContent = 'Compressing...';
    result.classList.add('hidden');
    error.classList.add('hidden');
    limitWarning.classList.add('hidden');

    const level = document.querySelector('input[name="level"]:checked').value;
    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('level', level);

    try {
        const res = await fetch('/tools/api/pdf-compress', { method: 'POST', body: formData });
        if (res.status === 429) {
            const data = await res.json();
            limitWarning.innerHTML = `⚠️ ${data.message}`;
            limitWarning.classList.remove('hidden');
            processBtn.textContent = 'Limit Reached';
            return;
        }
        if (!res.ok) {
            const data = await res.json();
            showError(data.message || data.error || 'Compression failed.');
            processBtn.textContent = 'Compress PDF';
            processBtn.disabled = false;
            return;
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const reduction = selectedFile.size > 0
            ? ((1 - blob.size / selectedFile.size) * 100).toFixed(0)
            : 0;
        result.innerHTML = `✅ Done! <strong>${reduction}% smaller</strong> (${(blob.size/1024).toFixed(0)} KB)
            <br><a href="${url}" download="compressed_${selectedFile.name}" class="text-brand-600 font-medium underline mt-1 inline-block">Download compressed PDF</a>`;
        result.classList.remove('hidden');
        processBtn.textContent = 'Compress Another';
    } catch (e) {
        showError('Network error. Please try again.');
        processBtn.textContent = 'Compress PDF';
    }
    processBtn.disabled = false;
});

function showError(msg) {
    error.textContent = msg;
    error.classList.remove('hidden');
}
</script>
{% endblock %}
