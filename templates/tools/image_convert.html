{% extends "base.html" %}
{% block title %}Convert Image — ToolKit Pro{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-4 pt-8 pb-16">
    <a href="/dashboard" class="text-sm text-brand-600 hover:underline mb-4 inline-block">← Back to Dashboard</a>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Convert Image</h1>
    <p class="text-gray-500 mb-8">Convert images between PNG, JPG, and WebP formats. Fast, free, private.</p>

    <div class="bg-white rounded-2xl border border-gray-200 p-8">
        <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center hover:border-brand-400 transition cursor-pointer">
            <div class="text-4xl mb-3">🔄</div>
            <p class="text-gray-600 font-medium">Drop image here or click to browse</p>
            <p class="text-sm text-gray-400 mt-1">PNG, JPG, WebP. Max 10MB.</p>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
        </div>
        <div id="fileInfo" class="hidden mt-4 p-3 bg-gray-50 rounded-lg text-sm text-gray-700"></div>
        <div id="formatSelect" class="hidden mt-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Convert to</label>
            <select id="format" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 outline-none">
                <option value="png">PNG</option>
                <option value="jpg">JPG</option>
                <option value="webp">WebP</option>
            </select>
        </div>
        <button id="processBtn" class="hidden w-full mt-4 bg-brand-600 text-white py-3 rounded-xl font-semibold hover:bg-brand-700 transition disabled:opacity-50" disabled>
            Convert Image
        </button>
        <div id="result" class="hidden mt-4 p-4 bg-green-50 rounded-xl text-sm"></div>
        <div id="error" class="hidden mt-4 p-4 bg-red-50 rounded-xl text-sm text-red-700"></div>
        <div id="limitWarning" class="hidden mt-4 p-4 bg-orange-50 rounded-xl text-sm"></div>
    </div>
</section>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const formatSelect = document.getElementById('formatSelect');
const processBtn = document.getElementById('processBtn');
const result = document.getElementById('result');
const error = document.getElementById('error');
const limitWarning = document.getElementById('limitWarning');
let selectedFile = null;

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-brand-400', 'bg-brand-50'); });
dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('border-brand-400', 'bg-brand-50'); });
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('border-brand-400', 'bg-brand-50');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

function handleFile(file) {
    if (!file.type.startsWith('image/')) { showError('Please upload an image.'); return; }
    selectedFile = file;
    fileInfo.textContent = `📷 ${file.name} (${(file.size/1024).toFixed(0)} KB)`;
    fileInfo.classList.remove('hidden');
    formatSelect.classList.remove('hidden');
    processBtn.classList.remove('hidden');
    processBtn.disabled = false;
    result.classList.add('hidden');
    error.classList.add('hidden');
    limitWarning.classList.add('hidden');
}

processBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    processBtn.disabled = true;
    processBtn.textContent = 'Converting...';
    result.classList.add('hidden');
    error.classList.add('hidden');
    limitWarning.classList.add('hidden');

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('format', document.getElementById('format').value);

    try {
        const res = await fetch('/tools/api/image-convert', { method: 'POST', body: formData });
        if (res.status === 429) { const data = await res.json(); limitWarning.innerHTML = `⚠️ ${data.message}`; limitWarning.classList.remove('hidden'); processBtn.textContent = 'Limit Reached'; return; }
        if (!res.ok) { const data = await res.json(); showError(data.error || 'Failed to convert.'); return; }
        const blob = await res.blob();
        const fmt = document.getElementById('format').value;
        const url = URL.createObjectURL(blob);
        result.innerHTML = `✅ Done! <a href="${url}" download="converted.${fmt}" class="text-brand-600 font-medium underline">Download ${fmt.toUpperCase()}</a>`;
        result.classList.remove('hidden');
        processBtn.textContent = 'Convert Another';
    } catch (e) { showError('Network error. Try again.'); }
    processBtn.disabled = false;
});

function showError(msg) { error.textContent = msg; error.classList.remove('hidden'); }
</script>
{% endblock %}
