{% extends "base.html" %}
{% block title %}File Converter — ToolKit Pro{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-4 pt-8 pb-16">
    <a href="/dashboard" class="text-sm text-brand-600 hover:underline mb-4 inline-block">← Back to Dashboard</a>
    <h1 class="text-2xl font-bold text-gray-900 mb-2 dark:text-white">File Converter</h1>
    <p class="text-gray-500 mb-8 dark:text-slate-400">Convert between common file formats. CSV → JSON, JSON → CSV, Markdown → HTML, and more.</p>

    <div class="bg-white rounded-2xl border border-gray-200 p-8 dark:bg-slate-800 dark:border-slate-700">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1 dark:text-slate-300">Select Conversion</label>
            <select id="convType" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 dark:bg-slate-700 dark:border-slate-600 dark:text-white">
                <option value="csv2json">CSV → JSON</option>
                <option value="json2csv">JSON → CSV</option>
                <option value="md2html">Markdown → HTML</option>
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1 dark:text-slate-300">Paste Input</label>
            <textarea id="inputText" rows="10" placeholder="Paste your data here..."
                class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-500 outline-none resize-y text-sm font-mono dark:bg-slate-700 dark:border-slate-600 dark:text-white"></textarea>
        </div>
        <button id="convertBtn" class="w-full bg-brand-600 text-white py-3 rounded-xl font-semibold hover:bg-brand-700 transition">
            Convert
        </button>
        <div id="output" class="hidden mt-6">
            <label class="block text-sm font-medium text-gray-700 mb-1 dark:text-slate-300">Result</label>
            <textarea id="outputText" rows="10" readonly
                class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 resize-y text-sm font-mono dark:bg-slate-900 dark:border-slate-600 dark:text-white"></textarea>
            <button onclick="copyOutput()" class="mt-2 bg-gray-100 px-4 py-2 rounded-lg text-sm hover:bg-gray-200 dark:bg-slate-700 dark:text-white">📋 Copy</button>
        </div>
    </div>
</section>

<script>
function csvToJSON(csv) {
    const lines = csv.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim());
    return JSON.stringify(lines.slice(1).filter(l => l.trim()).map(line => {
        const values = line.split(',').map(v => v.trim());
        const obj = {};
        headers.forEach((h, i) => obj[h] = values[i] || '');
        return obj;
    }), null, 2);
}

function jsonToCSV(json) {
    const data = JSON.parse(json);
    if (!Array.isArray(data) || !data.length) return '[]';
    const headers = Object.keys(data[0]);
    const csv = [headers.join(',')];
    data.forEach(row => csv.push(headers.map(h => JSON.stringify(row[h] ?? '')).join(',')));
    return csv.join('\n');
}

function mdToHTML(md) {
    return md
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/^\- (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(.+)$/gm, p => p.startsWith('<') ? p : `<p>${p}</p>`);
}

document.getElementById('convertBtn').addEventListener('click', () => {
    const type = document.getElementById('convType').value;
    const input = document.getElementById('inputText').value;
    let result = '';
    try {
        if (type === 'csv2json') result = csvToJSON(input);
        else if (type === 'json2csv') result = jsonToCSV(input);
        else if (type === 'md2html') result = mdToHTML(input);
        document.getElementById('outputText').value = result;
        document.getElementById('output').classList.remove('hidden');
    } catch (e) {
        document.getElementById('outputText').value = 'Error: ' + e.message;
        document.getElementById('output').classList.remove('hidden');
    }
});

function copyOutput() {
    navigator.clipboard.writeText(document.getElementById('outputText').value);
}
</script>
{% endblock %}
