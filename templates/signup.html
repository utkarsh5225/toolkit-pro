{% extends "base.html" %}
{% block title %}Sign Up — ToolKit Pro{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-4 pt-16 pb-16">
    <h1 class="text-2xl font-bold text-gray-900 text-center mb-2">Create Account</h1>
    <p class="text-gray-500 text-center mb-8">Free forever. No credit card required.</p>
    <form method="POST" class="bg-white rounded-2xl border border-gray-200 p-8 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" placeholder="you@email.com">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required minlength="6" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" placeholder="Min 6 characters">
        </div>
        <button type="submit" class="w-full bg-brand-600 text-white py-3 rounded-xl font-semibold hover:bg-brand-700 transition">Create Free Account</button>
        <p class="text-center text-sm text-gray-500">
            Already have an account? <a href="/auth/login" class="text-brand-600 font-medium">Log in</a>
        </p>
    </form>
</section>
{% endblock %}
