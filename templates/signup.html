{% extends "base.html" %}
{% block title %}Sign Up — ToolKit Pro{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-4 pt-16 pb-16">
    <h1 class="text-2xl font-bold text-gray-900 text-center mb-2 dark:text-white">Create Account</h1>
    <p class="text-gray-500 text-center mb-8 dark:text-slate-400">Free forever. No credit card required.</p>
    <form method="POST" class="bg-white rounded-2xl border border-gray-200 p-8 space-y-4 dark:bg-slate-800 dark:border-slate-700">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 dark:text-slate-300">Email</label>
            <input type="email" name="email" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none dark:bg-slate-700 dark:border-slate-600 dark:text-white" placeholder="you@email.com">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 dark:text-slate-300">Password</label>
            <input type="password" name="password" required minlength="8" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none dark:bg-slate-700 dark:border-slate-600 dark:text-white" placeholder="Min 8 chars, 1 uppercase, 1 number">
        </div>
        <button type="submit" class="w-full bg-brand-600 text-white py-3 rounded-xl font-semibold hover:bg-brand-700 transition">Create Free Account</button>
        <p class="text-center text-sm text-gray-500 dark:text-slate-400">
            Already have an account? <a href="/auth/login" class="text-brand-600 font-medium">Log in</a>
        </p>
    </form>
</section>
{% endblock %}
