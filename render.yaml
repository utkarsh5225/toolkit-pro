services:
  - type: web
    name: toolkit-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -b 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///toolkit.db
      - key: SITE_URL
        value: https://toolkit-pro.onrender.com
